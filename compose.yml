services:

  redis:
    image: redis:8.6-alpine  
    deploy: 
      placement: 
        constraints:
          - node.role == manager
      restart_policy: 
        condition: on-failure
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 10s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - ecommerce-net

  rabbitmq:
    image: rabbitmq:4.0.9-management-alpine
    ports:
      - '15672:15672'
    env_file:
      - .env
    deploy: 
      placement: 
        constraints:
          - node.role == manager
      restart_policy: 
        condition: on-failure
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ecommerce-net

  gateway:
    image: ecommerce-gateway:1.0    
    ports:
      - '3000:3000'
    env_file:
      - .env
    deploy: 
      replicas: 1
      restart_policy: 
        condition: on-failure
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s
    depends_on:
      - redis
      - rabbitmq
      - product_mysql
      - account_mysql
      - cart_mysql
      - order_mysql
    networks:
      - ecommerce-net

  product:
    image: ecommerce-product:1.0 
    env_file:
      - .env
    deploy: 
      replicas: 1
      restart_policy: 
        condition: on-failure
    depends_on:
      - product_mysql
      - rabbitmq
    networks:
      - ecommerce-net

  product_mysql:
    image: mysql:9.2
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${PRODUCT_DB_NAME}
    deploy:
      placement: 
        constraints:
          - node.role == manager
      restart_policy: 
        condition: on-failure
    volumes:
      - product-mysql-data:/var/lib/mysql
      - ./apps/product/initProduct.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-net

  account:
    image: ecommerce-account:1.0
    env_file:
      - .env
    deploy: 
      replicas: 1
      restart_policy: 
        condition: on-failure
    depends_on:
      - account_mysql
      - rabbitmq
    networks:
      - ecommerce-net

  account_mysql:
    image: mysql:9.2  
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${ACCOUNT_DB_NAME}
    deploy:
      placement: 
        constraints:
          - node.role == manager
      restart_policy: 
        condition: on-failure
    volumes:
      - account-mysql-data:/var/lib/mysql
      - ./apps/account/initAccount.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-net

  cart:
    image: ecommerce-cart:1.0
    env_file:
      - .env
    deploy: 
      replicas: 1
      restart_policy: 
        condition: on-failure
    depends_on:
      - cart_mysql
      - rabbitmq
    networks:
      - ecommerce-net

  cart_mysql:
    image: mysql:9.2
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${CART_DB_NAME}
    deploy:
      placement: 
        constraints:
          - node.role == manager
      restart_policy: 
        condition: on-failure
    volumes:
      - cart-mysql-data:/var/lib/mysql
      - ./apps/cart/initCart.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-net

  order:
    image: ecommerce-order:1.0      
    env_file:
      - .env
    deploy: 
      replicas: 1
      restart_policy: 
        condition: on-failure
    depends_on:
      - order_mysql
      - rabbitmq
    networks:
      - ecommerce-net

  order_mysql:
    image: mysql:9.2 
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${ORDER_DB_NAME}
    deploy:
      placement: 
        constraints:
          - node.role == manager
      restart_policy: 
        condition: on-failure
    volumes:
      - order-mysql-data:/var/lib/mysql
      - ./apps/order/initOrder.sql:/docker-entrypoint-initdb.d/init.sql 
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-net

volumes:
  product-mysql-data:
  account-mysql-data:
  cart-mysql-data:
  order-mysql-data:
  rabbitmq-data:
  redis-data:

networks:
  ecommerce-net:
    driver: overlay